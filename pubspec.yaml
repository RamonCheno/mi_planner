name: miplanner_v2
description: A Flutter application with Clean Architecture and GetX.
# Author: RamonChenoDev
version: 1.0.0+1
publish_to: 'none'
homepage: https://github.com/RamonChenoDev/miplanner_v2

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  adaptive_theme: ^3.7.2
  android_intent_plus: ^5.1.0
  drift: ^2.22.1
  drift_sqflite: ^2.0.1
  flutter:
    sdk: flutter
  awesome_notifications: ^0.11.0
  flutter_local_notifications: ^21.0.0
  flutter_slidable: ^4.0.3
  flutter_timezone: ^5.0.2
  get: ^4.6.6
  intl: ^0.20.2
  json_annotation: ^4.12.0
  logger: ^2.4.0
  path: ^1.9.1
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  shared_preferences: ^2.3.2
  table_calendar: ^3.2.0
  timezone: ^0.11.0

dev_dependencies:
  build_runner: ^2.4.12
  drift_dev: ^2.22.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  json_serializable: ^6.14.0
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
